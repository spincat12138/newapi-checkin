name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve image links
        id: image
        shell: bash
        run: |
          repository="${GITHUB_REPOSITORY,,}"
          package="${repository#*/}"
          echo "name=ghcr.io/${repository}" >> "$GITHUB_OUTPUT"
          echo "url=https://github.com/${GITHUB_REPOSITORY}/pkgs/container/${package}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate image metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image links to summary
        shell: bash
        run: |
          {
            echo "## Docker image published"
            echo
            echo "- Image: \`${{ steps.image.outputs.name }}\`"
            echo "- Package: [Open GHCR package](${{ steps.image.outputs.url }})"
            echo
            echo "### Published tags"
            echo '```text'
            echo '${{ steps.metadata.outputs.tags }}'
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
